<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Order Delivery Status</title>

  <!-- CSS Link -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <h1>Online Order Delivery Status</h1>

  <form class="order-form">

    <div class="input-group">
      <label for="client">Customer Name</label>
      <input type="text" id="client" name="client" placeholder="Enter customer name" required>
    </div>

    <div class="input-group">
      <label for="city">City Name</label>
      <input type="text" id="city" name="city" placeholder="Enter city name" required>
    </div>

    <div class="input-group">
      <label for="paymentStatus">Payment Status</label>
      <input type="text" id="paymentStatus" name="paymentStatus" placeholder="Paid or Pending" required>
    </div>

    <button type="button" onclick="getOrder()">Submit Order</button>

  </form>

</div>

<script src="script.js"></script>

</body>
</html>
